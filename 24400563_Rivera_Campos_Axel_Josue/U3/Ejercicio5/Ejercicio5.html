<!doctype html>
<html lang="es">
  <meta charset="UTF-8" />
  <title>Google</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link
    rel="icon"
    href="https://www.google.com/favicon.ico"
    type="image/x-icon"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap"
    rel="stylesheet"
  />
  <body>
    <div class="contenido">
      <nav class="px-20">
        <a href="#">Gmail</a>
        <a href="#">Imágenes</a>
        <a href="#" class="button-blue">Acceder</a>
      </nav>
      <div class="central-content">
        <header>
          <h1>
            <span class="blue">G</span><span class="red">o</span
            ><span class="yellow">o</span><span class="blue">g</span
            ><span class="green">l</span><span class="red">e</span>
          </h1>
        </header>
        <main>
          <input
            class="buscador"
            type="text"
            placeholder="Ingresa una búsqueda..."
          />
          <div class="container-buttons">
            <button class="button-gray">Buscar con Google</button>
            <button class="button-gray">Voy a tener suerte</button>
          </div>
        </main>
      </div>
      <footer>
        <div class="p-10 border-b px-20">Mexico</div>
        <div class="p-10 flex gap-4 justify-between flex-wrap px-20">
          <div class="flex gap-4 flex-wrap">
            <a href="#">Sobre Google</a>
            <a href="#">Publicidad</a>
            <a href="#">Negocios</a>
            <a href="#">Como funciona la Búsqueda</a>
          </div>
					<div class="flex gap-4 flex-wrap">
						<a href="#">Privacidad</a>
						<a href="#">Condiciones</a>
						<a href="#">Configuración</a>
					</div>
        </div>
      </footer>
    </div>
  </body>
</html>
